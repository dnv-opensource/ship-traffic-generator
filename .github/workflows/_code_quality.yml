name: Code Quality

on: workflow_call

jobs:
  ruff_format:
    runs-on: ubuntu-latest
    name: ruff format
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: 'uv.lock'
      - name: Install the project
        run: uv sync -U
      - name: Run ruff format
        run: uv run ruff format --diff

  ruff_check:
    runs-on: ubuntu-latest
    name: ruff check
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: 'uv.lock'
      - name: Install the project
        run: uv sync -U
      - name: Run ruff check
        run: uv run ruff check --diff

  pyright:
    runs-on: ubuntu-latest
    name: pyright
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: 'uv.lock'
      - name: Install the project
        run: uv sync -U
      - name: Run pyright
        run: uv run pyright

  mypy:
    runs-on: ubuntu-latest
    name: mypy
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: 'uv.lock'
      - name: Install the project
        run: uv sync -U
      - name: Run mypy
        run: uv run mypy
